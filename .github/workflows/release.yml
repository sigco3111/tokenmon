name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Git tag to publish, for example v0.1.0
        required: true
        type: string

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  TOKENMON_XCODE_VERSION: '26.4'

jobs:
  verify-release:
    runs-on: macos-26
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
      TOKENMON_VERIFY_SCRATCH_PATH: ${{ github.workspace }}/.build/ci-release-verify

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Select latest Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.TOKENMON_XCODE_VERSION }}

      - name: Validate Xcode
        run: |
          xcode_version="$(xcodebuild -version)"
          printf '%s\n' "$xcode_version"
          printf '%s\n' "$xcode_version" | grep -q "^Xcode ${{ env.TOKENMON_XCODE_VERSION }}"

      - name: Restore SwiftPM cache
        uses: actions/cache@v5
        with:
          path: |
            ${{ env.TOKENMON_VERIFY_SCRATCH_PATH }}
          key: ${{ runner.os }}-xcode-${{ env.TOKENMON_XCODE_VERSION }}-lane-release-verify-${{ hashFiles('Package.resolved', 'Packaging/Tokenmon-Info.plist', 'scripts/**', '.github/workflows/**') }}
          restore-keys: |
            ${{ runner.os }}-xcode-${{ env.TOKENMON_XCODE_VERSION }}-lane-release-verify-
            ${{ runner.os }}-xcode-${{ env.TOKENMON_XCODE_VERSION }}-

      - name: Validate release inputs
        run: ./scripts/release-preflight.sh "$RELEASE_TAG" --skip-secrets

      - name: Run fast release verification
        run: ./scripts/ai-verify --mode pr

  build-macos-release:
    needs: verify-release
    runs-on: macos-26
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
      TOKENMON_RELEASE_SCRATCH_PATH: ${{ github.workspace }}/.build/ci-release
      GH_TOKEN: ${{ github.token }}
      HOMEBREW_TAP_REPOSITORY: ${{ vars.HOMEBREW_TAP_REPOSITORY }}
      SPARKLE_PUBLIC_ED_KEY: ${{ vars.SPARKLE_PUBLIC_ED_KEY }}
      CSC_LINK: ${{ secrets.CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
      SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
      APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Select latest Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.TOKENMON_XCODE_VERSION }}

      - name: Validate Xcode
        run: |
          xcode_version="$(xcodebuild -version)"
          printf '%s\n' "$xcode_version"
          printf '%s\n' "$xcode_version" | grep -q "^Xcode ${{ env.TOKENMON_XCODE_VERSION }}"

      - name: Restore SwiftPM cache
        uses: actions/cache@v5
        with:
          path: |
            ${{ env.TOKENMON_RELEASE_SCRATCH_PATH }}
          key: ${{ runner.os }}-xcode-${{ env.TOKENMON_XCODE_VERSION }}-lane-release-${{ hashFiles('Package.resolved', 'Packaging/Tokenmon-Info.plist', 'scripts/**', '.github/workflows/**') }}
          restore-keys: |
            ${{ runner.os }}-xcode-${{ env.TOKENMON_XCODE_VERSION }}-lane-release-
            ${{ runner.os }}-xcode-${{ env.TOKENMON_XCODE_VERSION }}-

      - name: Validate release secrets
        run: ./scripts/release-preflight.sh "$RELEASE_TAG"

      - name: Build signed release assets
        run: |
          version="${RELEASE_TAG#v}"
          VERSION="$version" BUILD_NUMBER="${GITHUB_RUN_NUMBER}" ./scripts/build-release-archive --scratch-path "$TOKENMON_RELEASE_SCRATCH_PATH"

      - name: Smoke-test signed release zip
        run: |
          version="${RELEASE_TAG#v}"
          zip_path="dist/releases/Tokenmon-${version}-macos.zip"
          extract_dir="$RUNNER_TEMP/release-zip-smoke"

          if [[ ! -f "$zip_path" ]]; then
            echo "Missing release ZIP at $zip_path"
            exit 1
          fi

          rm -rf "$extract_dir"
          mkdir -p "$extract_dir"
          ditto -x -k "$zip_path" "$extract_dir"
          "$extract_dir/Tokenmon.app/Contents/MacOS/TokenmonApp" --smoke-test --db "$extract_dir/release-smoke.sqlite" >/dev/null

      - name: Generate Homebrew cask
        run: |
          version="${RELEASE_TAG#v}"
          dmg_path="dist/releases/Tokenmon-${version}.dmg"

          if [[ ! -f "$dmg_path" ]]; then
            echo "Missing release DMG at $dmg_path"
            exit 1
          fi

          dmg_sha="$(shasum -a 256 "$dmg_path" | awk '{print $1}')"
          ./scripts/generate-homebrew-cask \
            --version "$version" \
            --sha256 "$dmg_sha" \
            --output dist/releases/tokenmon.rb

      - name: Generate Sparkle appcast
        run: |
          version="${RELEASE_TAG#v}"
          dmg_path="dist/releases/Tokenmon-${version}.dmg"

          ./scripts/generate-sparkle-appcast \
            --archive "$dmg_path" \
            --tag "$RELEASE_TAG" \
            --release-notes dist/releases/RELEASE_NOTES.txt \
            --output dist/releases/appcast.xml

      - name: Detect prerelease tag
        id: release_meta
        run: |
          if [[ "${RELEASE_TAG}" =~ -(alpha|beta|rc)\.[0-9]+$ ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          release_title="$(cat dist/releases/RELEASE_TITLE)"
          release_notes_file="dist/releases/RELEASE_NOTES.md"
          prerelease_args=()
          assets=()

          if [ "${{ steps.release_meta.outputs.prerelease }}" = "true" ]; then
            prerelease_args+=(--prerelease)
          fi

          if [[ ! -f "$release_notes_file" ]]; then
            echo "Missing generated release notes at $release_notes_file"
            exit 1
          fi

          while IFS= read -r asset; do
            assets+=("$asset")
          done < <(find dist/releases -maxdepth 1 -type f \
            \( -name '*.zip' -o -name '*.dmg' -o -name '*.txt' -o -name '*.md' -o -name 'SHA256SUMS.txt' -o -name 'tokenmon.rb' -o -name 'appcast.xml' \) \
            ! -name 'RELEASE_TITLE' \
            ! -name 'RELEASE_TITLE.ko' | sort)

          if [ "${#assets[@]}" -eq 0 ]; then
            echo "No release files found in dist/releases."
            exit 1
          fi

          if gh release view "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" "${assets[@]}" \
              --repo "${GITHUB_REPOSITORY}" \
              --clobber
            gh release edit "${RELEASE_TAG}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "${release_title}" \
              --notes-file "$release_notes_file" \
              "${prerelease_args[@]}"
          else
            gh release create "${RELEASE_TAG}" "${assets[@]}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "${release_title}" \
              --notes-file "$release_notes_file" \
              --target "${GITHUB_SHA}" \
              "${prerelease_args[@]}"
          fi

      - name: Verify published release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${RELEASE_TAG#v}"
          release_json="$(gh release view "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" --json url,isPrerelease,assets,name)"

          RELEASE_JSON="$release_json" \
          RELEASE_TAG="$RELEASE_TAG" \
          RELEASE_VERSION="$version" \
          python3 - <<'PY'
          import json
          import os
          import sys

          payload = json.loads(os.environ["RELEASE_JSON"])
          version = os.environ["RELEASE_VERSION"]
          asset_names = {asset["name"] for asset in payload.get("assets", [])}
          required = {
              f"Tokenmon-{version}.dmg",
              f"Tokenmon-{version}-macos.zip",
              f"Tokenmon-{version}.txt",
              "SHA256SUMS.txt",
              "appcast.xml",
              "tokenmon.rb",
          }
          missing = sorted(required - asset_names)
          if missing:
              print("Missing published release assets:", file=sys.stderr)
              for name in missing:
                  print(f"  - {name}", file=sys.stderr)
              sys.exit(1)
          PY

      - name: Write release summary
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          release_url="$(gh release view "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" --json url --jq '.url')"
          {
            echo "## Tokenmon release published"
            echo ""
            echo "- Tag: \`${RELEASE_TAG}\`"
            echo "- Release URL: ${release_url}"
            echo "- Sparkle feed: \`https://github.com/${GITHUB_REPOSITORY}/releases/latest/download/appcast.xml\`"
            echo "- Automatic updates: installed release builds will prompt users on the next Sparkle check or when they choose \`Check for Updates…\`."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Publish Homebrew cask to tap
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
        run: |
          if [[ -z "${HOMEBREW_TAP_REPOSITORY}" || -z "${GH_TOKEN}" ]]; then
            echo "Homebrew tap publish skipped: HOMEBREW_TAP_REPOSITORY or HOMEBREW_TAP_GITHUB_TOKEN is not configured."
            exit 0
          fi

          ./scripts/sync-homebrew-tap \
            --tap-repo "${HOMEBREW_TAP_REPOSITORY}" \
            --cask-file dist/releases/tokenmon.rb \
            --commit-message "tokenmon ${RELEASE_TAG}"

      - name: Upload release assets
        uses: actions/upload-artifact@v6
        with:
          name: release-assets-${{ env.RELEASE_TAG }}
          path: |
            dist/releases/Tokenmon.app
            dist/releases/*.zip
            dist/releases/*.dmg
            dist/releases/*.txt
            dist/releases/SHA256SUMS.txt
            dist/releases/tokenmon.rb
            dist/releases/appcast.xml
          retention-days: 14
